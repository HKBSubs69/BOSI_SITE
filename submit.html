<!DOCTYPE html>
<html>
<head>
  <title>Submit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="navbar">
  <img src="https://i.ibb.co/S45PTZqN/Blue-Ocean-Studios-India-7-22-2024.png" class="logo">
  <nav>
    <a href="index.html">Home</a>
    <a href="track.html">Track</a>
  </nav>
</header>

<h1 id="formTitle"></h1>

<form id="submissionForm">

<input type="text" id="submitName" placeholder="Full Name" required>
<input type="email" id="submitEmail" placeholder="Email" required>

<select id="submitType" required>
  <option value="">Select Type</option>
  <option value="Music Artist">Music Artist</option>
  <option value="Writer">Writer</option>
</select>

<input type="text" id="submitTitle" placeholder="Track / Book Title" required>
<input type="url" id="submitLink" placeholder="Drive / Dropbox Link" required>

<textarea id="submitNotes" placeholder="Details" required></textarea>

<button type="submit" class="btn-primary">Submit Work</button>

<p id="submissionStatus"></p>
<div id="trackingBox"></div>

</form>

<footer class="footer">
  <p>© <span id="year"></span> Blue Ocean Studios India</p>
</footer>

<script>
document.getElementById("year").innerText = new Date().getFullYear();
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/submit.js"></script>

</body>
  </html>
